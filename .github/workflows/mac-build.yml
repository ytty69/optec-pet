name: Mac Build

on:
  workflow_dispatch:  # 手动触发:GitHub 网页 → Actions → Mac Build → Run workflow
  push:
    tags:
      - 'v*'          # 打 tag 也会触发:git tag v0.0.2 && git push --tags

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & package (dmg)
        run: npm run dist
        env:
          # Skip code signing — we don't have an Apple Developer cert. Users
          # will need to right-click → 打开 the first time.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            release/*.dmg
            release/*.dmg.blockmap
          if-no-files-found: error
          retention-days: 14
